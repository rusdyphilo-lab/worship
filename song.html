<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Lagu</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ============================================================
       SONG PAGE — compact mobile-first overrides
       ============================================================ */

    .song-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 1rem;
    }
    .song-top-info { flex: 1; min-width: 0; }
    .song-top-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      word-break: break-word;
      line-height: 1.3;
    }
    /* JOB #5 — Remove default_key from meta */
    .song-top-meta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .song-top-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--muted);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s, transform 0.1s;
    }
    .icon-btn:active {
      background: var(--accent-light);
      transform: scale(0.92);
    }

    /* JOB #13 — Wake Lock indicator */
    .icon-btn.wake-active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Compact key controls — single row */
    .key-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      margin-bottom: 1rem;
    }
    .key-bar-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--hint);
      font-weight: 500;
    }
    .key-bar .t-btn {
      width: 36px;
      height: 36px;
      font-size: 18px;
      flex-shrink: 0;
    }
    .key-bar .current-key {
      font-size: 22px;
      min-width: 32px;
    }
    .key-bar-spacer { flex: 1; }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .toggle-track {
      position: relative;
      width: 36px;
      height: 20px;
      background: var(--border);
      border-radius: 10px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-track.on {
      background: var(--accent);
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle-track.on .toggle-thumb {
      transform: translateX(16px);
    }

    /* Font size control */
    .font-bar {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .font-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.1s, transform 0.1s;
    }
    .font-btn:active {
      background: var(--accent-light);
      transform: scale(0.9);
    }

    /* Chord sections — dynamic font size */
    .chord-sections-wrap {
      --chord-size: 15px;
    }
    .chord-sections-wrap .chord-pill {
      font-size: var(--chord-size);
      padding: 4px 10px;
      min-height: 32px;
    }
    .chord-sections-wrap .chord-section {
      padding: 12px;
      margin-bottom: 6px;
    }
    .chord-sections-wrap .chord-line {
      gap: 5px;
    }

    /* Dot token — hold/sustain */
    .chord-dot {
      font-size: 22px;
      color: var(--muted);
      line-height: 1;
      padding: 0 2px;
      opacity: 0.5;
    }
    .chord-pill.num-mode {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
    }

    /* Lyrics with dynamic font */
    .lyrics-wrap {
      --lyric-size: 15px;
    }
    .lyrics-wrap .lyrics-block {
      font-size: var(--lyric-size);
    }

    /* Sectioned lyric display (when labels detected) */
    .lyric-section {
      margin-bottom: 20px;
    }
    .lyric-section:last-child {
      margin-bottom: 0;
    }
    .lyric-section-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--hint);
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lyric-section-badge {
      display: inline-flex;
      padding: 3px 10px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .lyric-section-body {
      font-size: var(--lyric-size);
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* JOB #14 — Prev/Next navigation */
    .song-nav {
      display: flex;
      gap: 8px;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .song-nav-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      touch-action: manipulation;
      transition: background 0.1s, transform 0.1s;
      min-height: 52px;
      user-select: none;
      -webkit-user-select: none;
    }
    .song-nav-btn:active { background: var(--bg); transform: scale(0.98); }
    .song-nav-btn.next { flex-direction: row-reverse; text-align: right; }
    .song-nav-arrow { font-size: 20px; color: var(--hint); flex-shrink: 0; }
    .song-nav-info { min-width: 0; flex: 1; }
    .song-nav-label { font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.06em; }
    .song-nav-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ============================================================
       CHORD + LIRIK MODE — chord di atas lirik
       ============================================================ */
    .cl-wrap {
      --cl-size: 15px;
    }
    .cl-section {
      margin-bottom: 20px;
    }
    .cl-section-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--hint);
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cl-section-badge {
      display: inline-flex;
      padding: 3px 10px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .cl-line {
      display: flex;
      flex-direction: column;
      margin-bottom: 10px;
    }
    .cl-chords {
      display: flex;
      align-items: flex-end;
      flex-wrap: nowrap;
      margin-bottom: 2px;
      min-height: 22px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }
    .cl-chords::-webkit-scrollbar { height: 3px; }
    .cl-chords::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .cl-chord-name {
      font-family: 'DM Mono', 'SF Mono', ui-monospace, monospace;
      font-size: calc(var(--cl-size) * 0.82);
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      padding: 1px 7px;
      border-radius: 5px;
      line-height: 1.4;
      margin-bottom: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cl-chord-name.passing {
      background: #ede9fe;
      color: #5b21b6;
      border: 1px solid #c4b5fd;
      padding: 0 5px;
    }
    .cl-chord-name.synco {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
      padding: 0 5px;
    }
    @media (prefers-color-scheme: dark) {
      .cl-chord-name.passing { background: #1e1535; color: #a78bfa; border-color: #5b21b6; }
      .cl-chord-name.synco { background: #2d1f00; color: #fcd34d; border-color: #92400e; }
    }
    .cl-lyric-line {
      font-size: var(--cl-size);
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .cl-instrumental {
      font-size: calc(var(--cl-size) * 0.85);
      color: var(--hint);
      font-style: italic;
    }
    .cl-separator {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* Inline chord+lyric units */
    .cl-inline-line {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 10px;
      line-height: 1;
    }
    .cl-unit {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .cl-unit .cl-chord-name {
      margin-bottom: 2px;
      align-self: flex-start;
    }
    .cl-lyric-part {
      font-size: var(--cl-size);
      color: var(--text);
      white-space: pre;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Worship</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Lagu</a>
    <a href="setlist.html" class="nav-link">Setlist</a>
    <a href="admin.html" class="nav-link">Admin</a>
  </div>
</nav>

<div class="container">
  <div id="content">
    <!-- Skeleton while loading -->
    <div style="margin-bottom:1rem">
      <div class="skeleton-card" style="min-height:70px"><div class="skeleton-line skeleton-title" style="width:50%"></div><div class="skeleton-line skeleton-sub" style="width:30%"></div></div>
    </div>
    <div class="skeleton-card"><div class="skeleton-line skeleton-title"></div></div>
    <div class="skeleton-card" style="min-height:120px"><div class="skeleton-line skeleton-title" style="width:20%"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
const SECTION_ORDER = ['Intro','Verse','Reff','Bridge','Outro','Persembahan']
let song = null
let navList = []
let currentKeyIdx = 0
let currentTab = 'chord'
let showAsNotes = true
let chordSize = 15
let lyricSize = 15
let clSize = 15  // Chord+Lirik font size
let wakeLock = null  // JOB #13

const params = new URLSearchParams(location.search)
const songId = params.get('id')
const urlKey = params.get('key')
const serviceId = params.get('service')  // set if opened from setlist

// Navigation list: either setlist order or alphabetical
// navList already declared above

async function loadNavList() {
  if (serviceId) {
    // Load setlist order for this service
    const { data } = await db
      .from('setlist_items')
      .select('position, key_used, songs(id, title)')
      .eq('service_id', serviceId)
      .order('position')
    if (data && data.length > 0) {
      navList = data.map(item => ({ id: item.songs.id, title: item.songs.title, key: item.key_used }))
      return
    }
  }
  // Fallback: alphabetical
  const { data } = await db.from('songs').select('id, title').order('title')
  navList = data || []
}

async function loadSong() {
  if (!songId) { location.href = 'index.html'; return }

  await loadNavList()

  const { data, error } = await db
    .from('songs')
    .select('*')
    .eq('id', songId)
    .single()

  if (error || !data) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="empty-icon">🎵</div><div class="empty-title">Lagu tidak ditemukan.</div><div class="empty-sub"><a href="index.html">Kembali ke library</a></div></div>'
    return
  }

  song = data
  document.title = song.title + ' — Worship App'

  if (urlKey) {
    const idx = keyIndex(urlKey)
    currentKeyIdx = idx >= 0 ? idx : keyIndex(song.default_key || 'C')
  } else {
    currentKeyIdx = keyIndex(song.default_key || 'C')
  }

  render()
}

function render() {
  const el = document.getElementById('content')
  // JOB #5 — meta: song_type, genre, tempo, notes
  const meta = [song.song_type, song.genre, song.tempo, song.notes].filter(Boolean).join(' · ')

  // JOB #4 — Show tab only if lyrics exist
  const hasLyrics = song.lyrics && song.lyrics.trim().length > 0
  if (!hasLyrics && currentTab === 'lyric') currentTab = 'chord'

  // Nav: prev/next from navList (setlist order or alphabetical)
  const currentIdx = navList.findIndex(s => s.id === songId)
  const prevSong = currentIdx > 0 ? navList[currentIdx - 1] : null
  const nextSong = currentIdx < navList.length - 1 ? navList[currentIdx + 1] : null
  const serviceParam = serviceId ? `&service=${serviceId}` : ''

  el.innerHTML = `
    <!-- Header: title + wake lock + edit -->
    <div class="song-top">
      <div class="song-top-info">
        <div class="song-top-title">${escapeHtml(song.title)}</div>
        ${meta ? `<div class="song-top-meta">${escapeHtml(meta)}</div>` : ''}
      </div>
      <div class="song-top-actions">
        <!-- JOB #13 — Wake Lock button -->
        <button class="icon-btn" id="wake-btn" onclick="toggleWakeLock()" title="Cegah layar mati" aria-label="Cegah layar mati">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="location.href='admin.html?edit=${song.id}'" title="Edit lagu" aria-label="Edit lagu" style="font-size:18px;">✏️</button>
      </div>
    </div>

    <!-- JOB #4 — Tab only if lyrics exist -->
    ${hasLyrics ? `
    <div class="tab-row">
      <button class="tab-btn ${currentTab==='chord'?'active':''}" onclick="switchTab('chord')">Chord</button>
      <button class="tab-btn ${currentTab==='both'?'active':''}" onclick="switchTab('both')">Chord+Lirik</button>
      <button class="tab-btn ${currentTab==='lyric'?'active':''}" onclick="switchTab('lyric')">Lirik</button>
    </div>` : ''}

    <!-- CHORD TAB -->
    <div id="tab-chord" style="display:${currentTab==='chord'?'block':'none'}">
      <!-- JOB #3 — key bar wraps on tiny phones via CSS -->
      <div class="key-bar">
        <span class="key-bar-label">Key</span>
        <button class="t-btn" onclick="transpose(-1)">−</button>
        <div class="current-key" id="cur-key">${KEYS[currentKeyIdx]}</div>
        <button class="t-btn" onclick="transpose(+1)">+</button>

        <div class="key-bar-spacer"></div>

        <!-- Angka / Nada toggle -->
        <div class="toggle-wrap" onclick="toggleMode()">
          <span id="mode-label">${showAsNotes ? 'Nada' : 'Angka'}</span>
          <div class="toggle-track ${showAsNotes ? 'on' : ''}" id="mode-toggle">
            <div class="toggle-thumb"></div>
          </div>
        </div>

        <!-- Font size -->
        <div class="font-bar">
          <button class="font-btn" onclick="changeSize(-1)">A−</button>
          <button class="font-btn" onclick="changeSize(+1)">A+</button>
        </div>
      </div>

      <div class="chord-sections-wrap" id="chord-sections-wrap" style="--chord-size:${chordSize}px">
        ${renderChordSections()}
      </div>
    </div>

    <!-- CHORD+LIRIK TAB -->
    ${hasLyrics ? `
    <div id="tab-both" style="display:${currentTab==='both'?'block':'none'}">
      <div class="key-bar">
        <span class="key-bar-label">Key</span>
        <button class="t-btn" onclick="transpose(-1)">−</button>
        <div class="current-key" id="cur-key-both">${KEYS[currentKeyIdx]}</div>
        <button class="t-btn" onclick="transpose(+1)">+</button>

        <div class="key-bar-spacer"></div>

        <div class="toggle-wrap" onclick="toggleMode()">
          <span id="mode-label-both">${showAsNotes ? 'Nada' : 'Angka'}</span>
          <div class="toggle-track ${showAsNotes ? 'on' : ''}" id="mode-toggle-both">
            <div class="toggle-thumb"></div>
          </div>
        </div>

        <div class="font-bar">
          <button class="font-btn" onclick="changeClSize(-1)">A−</button>
          <button class="font-btn" onclick="changeClSize(+1)">A+</button>
        </div>
      </div>

      <div class="cl-wrap" id="cl-wrap" style="--cl-size:${clSize}px">
        ${renderChordLyricMode()}
      </div>
    </div>` : ''}

    <!-- LYRIC TAB -->
    ${hasLyrics ? `
    <div id="tab-lyric" style="display:${currentTab==='lyric'?'block':'none'}">
      <div class="key-bar" style="margin-bottom:1rem;">
        <div class="key-bar-spacer"></div>
        <div class="font-bar">
          <button class="font-btn" onclick="changeLyricSize(-1)">A−</button>
          <button class="font-btn" onclick="changeLyricSize(+1)">A+</button>
        </div>
      </div>
      <div class="lyrics-wrap" id="lyrics-wrap" style="--lyric-size:${lyricSize}px">
        ${renderLyricMode()}
      </div>
    </div>` : ''}

    <!-- Prev/Next navigation -->
    <div class="song-nav">
      ${prevSong
        ? `<a class="song-nav-btn" href="song.html?id=${prevSong.id}${serviceParam}">
            <span class="song-nav-arrow">‹</span>
            <div class="song-nav-info">
              <div class="song-nav-label">Sebelumnya</div>
              <div class="song-nav-title">${escapeHtml(prevSong.title)}</div>
            </div>
           </a>`
        : '<div style="flex:1"></div>'
      }
      ${nextSong
        ? `<a class="song-nav-btn next" href="song.html?id=${nextSong.id}${serviceParam}">
            <span class="song-nav-arrow">›</span>
            <div class="song-nav-info">
              <div class="song-nav-label">Selanjutnya</div>
              <div class="song-nav-title">${escapeHtml(nextSong.title)}</div>
            </div>
           </a>`
        : '<div style="flex:1"></div>'
      }
    </div>
  `
}

// ============================================================
// CHORD RENDERING — Inline [chord]lyric format
// ============================================================

function renderChordSections() {
  const sections = song.sections || {}

  function hasContent(v) {
    if (!v) return false
    if (typeof v === 'string') return v.trim().length > 0
    if (Array.isArray(v)) return v.length > 0
    return false
  }

  const order = SECTION_ORDER.filter(s => hasContent(sections[s]))
  const extras = Object.keys(sections).filter(s => !SECTION_ORDER.includes(s) && hasContent(sections[s]))
  const allSecs = [...order, ...extras]

  if (allSecs.length === 0) {
    return '<div class="empty"><div class="empty-icon">🎸</div><div class="empty-title">Progresi chord belum tersedia.</div></div>'
  }

  const allChordsHtml = allSecs.map(secName => {
    const data = sections[secName]
    return renderSectionChordOnly(data)
  }).filter(Boolean).join('')

  return `<div class="chord-section">${allChordsHtml}</div>`
}

// Render chord-only view from inline [chord]lyric text
function renderSectionChordOnly(data) {
  if (!data) return ''
  const text = typeof data === 'string' ? data : legacyToText(data)
  if (!text.trim()) return ''

  // If new inline format
  if (isInlineFormat(text)) {
    const lines = parseInlineSection(text)
    return lines.map(segments => {
      const chords = segments.filter(seg => seg.chord)
      if (chords.length === 0) return ''
      const pills = chords.map(seg => {
        if (showAsNotes) {
          return `<span class="chord-pill">${escapeHtml(tokenToChord(seg.chord, currentKeyIdx))}</span>`
        } else {
          return `<span class="chord-pill num-mode">${escapeHtml(seg.chord)}</span>`
        }
      }).join(' ')
      return `<div class="chord-line">${pills}</div>`
    }).filter(Boolean).join('')
  }

  // Legacy plain token format fallback
  const tokens = normalizeSectionTokens(data)
  if (!tokens || tokens === null || tokens.length === 0) return ''
  const lines2 = []
  let cur = []
  for (const t of tokens) {
    if (t === '\n') { lines2.push(cur); cur = [] }
    else cur.push(t)
  }
  lines2.push(cur)
  return lines2.filter(l => l.length > 0).map(line => {
    return `<div class="chord-line">${renderTokensLegacy(line)}</div>`
  }).join('')
}

function renderTokensLegacy(tokens) {
  if (!tokens || tokens.length === 0) return ''
  return tokens.map(t => {
    if (t === '|') return '<span class="chord-sep">|</span>'
    if (t === '.') return '<span class="chord-dot">\xB7</span>'
    if (showAsNotes) return '<span class="chord-pill">' + escapeHtml(tokenToChord(t, currentKeyIdx)) + '</span>'
    return '<span class="chord-pill num-mode">' + escapeHtml(t) + '</span>'
  }).join(' ')
}

function legacyToText(arr) {
  if (!Array.isArray(arr)) return ''
  let text = ''
  arr.forEach(t => {
    if (!t || typeof t !== 'string' || !t.trim()) return
    if (t === '\n') { text += '\n'; return }
    if (text && !text.endsWith('\n') && !text.endsWith(' ')) text += ' '
    text += t
  })
  return text.trim()
}

// ============================================================
// CHORD + LIRIK MODE — inline [chord]lyric aligned rendering
// ============================================================

function renderChordLyricMode() {
  const sections = song.sections || {}

  function hasContent(v) {
    if (!v) return false
    if (typeof v === 'string') return v.trim().length > 0
    if (Array.isArray(v)) return v.length > 0
    return false
  }

  const order = SECTION_ORDER.filter(s => hasContent(sections[s]))
  const extras = Object.keys(sections).filter(s => !SECTION_ORDER.includes(s) && hasContent(sections[s]))
  const allSecs = [...order, ...extras]

  if (allSecs.length === 0) {
    return '<div class="empty"><div class="empty-icon">🎵</div><div class="empty-title">Belum ada konten.</div></div>'
  }

  return allSecs.map(secName => {
    const data = sections[secName]
    const linesHtml = renderInlineChordLyric(data)
    return `
      <div class="cl-section">
        <div class="cl-section-name">
          <span class="cl-section-badge">${escapeHtml(secName)}</span>
        </div>
        ${linesHtml}
      </div>
    `
  }).join('<div class="cl-separator"></div>')
}

// Render one section of inline [chord]lyric text as aligned chord+lyric lines
function renderInlineChordLyric(data) {
  if (!data) return ''
  const text = typeof data === 'string' ? data : legacyToText(data)
  if (!text.trim()) return ''

  if (!isInlineFormat(text)) {
    // Legacy: show chords only (no lyric alignment possible)
    return renderSectionChordOnly(data)
  }

  const lines = parseInlineSection(text)
  return lines.map(segments => {
    const hasChord = segments.some(seg => seg.chord)
    const hasLyric = segments.some(seg => seg.lyric && seg.lyric.trim())

    if (!hasChord && !hasLyric) return '<div style="height:6px;"></div>'

    // Build positioned chord+lyric using inline-block spans
    // Each segment = one [chord]lyric unit, displayed as a relative-positioned inline block
    const segHtml = segments.map(seg => {
      const lyricSpan = seg.lyric
        ? `<span class="cl-lyric-part">${escapeHtml(seg.lyric)}</span>`
        : ''

      if (seg.chord) {
        const chordName = showAsNotes
          ? escapeHtml(tokenToChord(seg.chord, currentKeyIdx))
          : escapeHtml(seg.chord)
        return `<span class="cl-unit">` +
          `<span class="cl-chord-name">${chordName}</span>` +
          lyricSpan +
          `</span>`
      }
      return lyricSpan ? `<span class="cl-unit">${lyricSpan}</span>` : ''
    }).join('')

    if (!hasLyric) {
      // Chord-only line
      const chordBadges = segments.filter(s => s.chord).map(seg => {
        const name = showAsNotes
          ? escapeHtml(tokenToChord(seg.chord, currentKeyIdx))
          : escapeHtml(seg.chord)
        return `<span class="cl-chord-name" style="margin-right:8px;">${name}</span>`
      }).join('')
      return `<div class="cl-line"><div class="cl-chords" style="justify-content:flex-start;">${chordBadges}</div><div class="cl-lyric-line cl-instrumental">(instrumental)</div></div>`
    }

    return `<div class="cl-line cl-inline-line">${segHtml}</div>`
  }).join('')
}

// ============================================================
// LIRIK MODE — strip chords, render plain lyrics
// ============================================================

function renderLyricMode() {
  // Build lyrics from sections (strip chord markers) if song.lyrics is empty
  let lyrics = song.lyrics || ''

  // If lyrics is empty but sections exist, derive from sections
  if (!lyrics.trim() && song.sections) {
    const parts = []
    SECTION_ORDER.forEach(s => {
      const d = song.sections[s]
      if (!d) return
      const text = typeof d === 'string' ? d : legacyToText(d)
      if (!text.trim()) return
      parts.push(s)
      text.split('\n').forEach(line => {
        const plain = stripChords(line).trim()
        if (plain) parts.push(plain)
      })
      parts.push('')
    })
    lyrics = parts.join('\n').trim()
  }

  if (!lyrics.trim()) {
    return '<div class="empty"><div class="empty-icon">🎵</div><div class="empty-title">Belum ada lirik.</div></div>'
  }

  // Strip any remaining chord markers from lyrics field
  lyrics = lyrics.replace(/\[[^\]]*\]/g, '')

  const blocks = splitLyricByLabels(lyrics)
  const labeledCount = blocks.filter(b => b.label).length

  if (labeledCount < 2) {
    return `<div class="lyrics-block">${escapeHtml(lyrics)}</div>`
  }

  return blocks.map(b => {
    const body = b.lines.join('\n').trim()
    if (!body && !b.label) return ''
    const header = b.label
      ? `<div class="lyric-section-name"><span class="lyric-section-badge">${escapeHtml(b.label)}</span></div>`
      : ''
    return `
      <div class="lyric-section">
        ${header}
        <div class="lyric-section-body">${escapeHtml(body)}</div>
      </div>
    `
  }).join('')
}

// ============================================================
// CONTROLS
// ============================================================

function transpose(delta) {
  currentKeyIdx = (currentKeyIdx + delta + 12) % 12
  updateChords()
}

function updateChords() {
  const curKeyEl = document.getElementById('cur-key')
  if (curKeyEl) curKeyEl.textContent = KEYS[currentKeyIdx]
  const curKeyBoth = document.getElementById('cur-key-both')
  if (curKeyBoth) curKeyBoth.textContent = KEYS[currentKeyIdx]
  const wrap = document.getElementById('chord-sections-wrap')
  if (wrap) wrap.innerHTML = renderChordSections()
  const clWrap = document.getElementById('cl-wrap')
  if (clWrap) clWrap.innerHTML = renderChordLyricMode()
}

function toggleMode() {
  showAsNotes = !showAsNotes
  const label = document.getElementById('mode-label')
  const toggle = document.getElementById('mode-toggle')
  if (label) label.textContent = showAsNotes ? 'Nada' : 'Angka'
  if (toggle) toggle.classList.toggle('on', showAsNotes)
  const labelBoth = document.getElementById('mode-label-both')
  const toggleBoth = document.getElementById('mode-toggle-both')
  if (labelBoth) labelBoth.textContent = showAsNotes ? 'Nada' : 'Angka'
  if (toggleBoth) toggleBoth.classList.toggle('on', showAsNotes)
  updateChords()
}

function changeSize(delta) {
  chordSize = Math.max(12, Math.min(28, chordSize + delta * 2))
  const wrap = document.getElementById('chord-sections-wrap')
  if (wrap) wrap.style.setProperty('--chord-size', chordSize + 'px')
}

function changeClSize(delta) {
  clSize = Math.max(12, Math.min(28, clSize + delta * 2))
  const wrap = document.getElementById('cl-wrap')
  if (wrap) wrap.style.setProperty('--cl-size', clSize + 'px')
}

function changeLyricSize(delta) {
  lyricSize = Math.max(12, Math.min(28, lyricSize + delta * 2))
  const wrap = document.getElementById('lyrics-wrap')
  if (wrap) wrap.style.setProperty('--lyric-size', lyricSize + 'px')
}

function switchTab(tab) {
  currentTab = tab
  const chord = document.getElementById('tab-chord')
  const lyric = document.getElementById('tab-lyric')
  const both = document.getElementById('tab-both')
  if (chord) chord.style.display = tab === 'chord' ? 'block' : 'none'
  if (lyric) lyric.style.display = tab === 'lyric' ? 'block' : 'none'
  if (both) both.style.display = tab === 'both' ? 'block' : 'none'
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const label = (btn.textContent || '').trim().toLowerCase()
    const match = (tab === 'chord' && label === 'chord')
      || (tab === 'both' && label === 'chord+lirik')
      || (tab === 'lyric' && label === 'lirik')
    btn.classList.toggle('active', match)
  })
}

// JOB #13 — Wake Lock API
async function toggleWakeLock() {
  const btn = document.getElementById('wake-btn')
  if (!('wakeLock' in navigator)) {
    toast('Wake Lock tidak didukung browser ini')
    return
  }
  if (wakeLock) {
    await wakeLock.release()
    wakeLock = null
    if (btn) btn.classList.remove('wake-active')
    btn.title = 'Cegah layar mati'
    toast('Layar kembali normal')
  } else {
    try {
      wakeLock = await navigator.wakeLock.request('screen')
      if (btn) btn.classList.add('wake-active')
      btn.title = 'Layar terkunci (ketuk untuk nonaktifkan)'
      toast('Layar tidak akan mati')
      wakeLock.addEventListener('release', () => {
        wakeLock = null
        if (btn) btn.classList.remove('wake-active')
      })
    } catch (e) {
      toast('Gagal mengaktifkan Wake Lock')
    }
  }
}

// Re-acquire wake lock when page becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    try {
      wakeLock = await navigator.wakeLock.request('screen')
    } catch {}
  }
})

function escapeHtml(str) {
  if (!str) return ''
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

loadSong()
