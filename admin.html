<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Worship App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Worship</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Lagu</a>
    <a href="setlist.html" class="nav-link">Setlist</a>
    <a href="admin.html" class="nav-link active">Admin</a>
  </div>
</nav>

<div class="container">

  <!-- Admin tabs -->
  <div class="tab-row">
    <button class="tab-btn active" onclick="showPanel('songs', this)">Kelola Lagu</button>
    <button class="tab-btn" onclick="showPanel('setlist', this)">Buat Setlist</button>
  </div>

  <!-- ============ PANEL: KELOLA LAGU ============ -->
  <div id="panel-songs">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div class="section-label" style="margin:0">Daftar Lagu</div>
      <button class="btn btn-primary" onclick="openSongForm()">+ Tambah Lagu</button>
    </div>

    <div class="search-wrap" style="margin-bottom:1rem;">
      <span class="search-icon">&#9906;</span>
      <input class="search-input" id="admin-search" type="text" placeholder="Cari lagu..." oninput="filterAdminSongs()" />
    </div>

    <div id="admin-song-list"><div class="loading">Memuat...</div></div>
  </div>

  <!-- ============ PANEL: BUAT SETLIST ============ -->
  <div id="panel-setlist" style="display:none">

    <div class="card" style="cursor:default;">
      <div class="section-label" style="margin-top:0">Info Ibadah</div>

      <div class="form-group">
        <label class="form-label">Tanggal</label>
        <input class="input-field" type="date" id="svc-date" />
      </div>

      <div class="form-group">
        <label class="form-label">Jenis Ibadah</label>
        <select class="input-field" id="svc-type">
          <option>Minggu Pagi</option>
          <option>Minggu Siang</option>
          <option>Rabu</option>
          <option>Subuh</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Tema (opsional)</label>
        <input class="input-field" type="text" id="svc-theme" placeholder="contoh: Kasih yang Memulihkan" />
      </div>
    </div>

    <div class="section-label">Lagu dalam setlist</div>
    <div id="setlist-songs" style="margin-bottom:1rem;"></div>

    <div class="card" style="cursor:default;">
      <div class="section-label" style="margin-top:0">Tambah lagu ke setlist</div>
      <div class="search-wrap" style="margin-bottom:8px;">
        <span class="search-icon">&#9906;</span>
        <input class="search-input" id="sl-search" type="text" placeholder="Cari lagu..." oninput="filterSlSongs()" />
      </div>
      <div id="sl-song-picker" style="max-height:240px;overflow-y:auto;"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveSetlist()">Simpan Setlist</button>
    </div>
  </div>

</div>

<!-- ============ MODAL: FORM LAGU ============ -->
<div id="song-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;overflow-y:auto;">
  <div style="max-width:640px;margin:2rem auto;padding:1rem;">
    <div style="background:var(--surface);border-radius:var(--radius);padding:1.5rem;border:1px solid var(--border);">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
        <h2 style="font-family:'Instrument Serif',serif;font-size:20px;" id="modal-title">Tambah Lagu</h2>
        <button class="btn" onclick="closeModal()" style="padding:6px 12px;">✕</button>
      </div>

      <!-- Basic info -->
      <div class="form-group">
        <label class="form-label">Judul *</label>
        <input class="input-field" id="f-title" type="text" placeholder="Nama lagu" />
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Key default</label>
          <select class="input-field" id="f-key">
            <option>C</option><option>C#</option><option>D</option><option>D#</option>
            <option>E</option><option>F</option><option>F#</option><option>G</option>
            <option>G#</option><option>A</option><option>A#</option><option>B</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Tipe Lagu</label>
          <select class="input-field" id="f-song-type">
            <option value="">— pilih —</option>
            <option>Hymn</option>
            <option>Worship</option>
            <option>SP</option>
          </select>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Genre</label>
          <input class="input-field" id="f-genre" type="text" placeholder="ballad, rock, funk..." />
        </div>
        <div class="form-group">
          <label class="form-label">Tempo</label>
          <input class="input-field" id="f-tempo" type="text" placeholder="slow, medium, fast..." />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Catatan umum</label>
        <input class="input-field" id="f-notes" type="text" placeholder="ambil ending, tunggu sign MD..." />
      </div>

      <!-- Chord + Lirik inline editor -->
      <div class="kbd-wrap">
        <div class="section-label" style="margin-top:0">Chord &amp; Lirik</div>

        <!-- Section label buttons -->
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">
          <span style="font-size:11px;color:var(--hint);align-self:center;margin-right:2px;">Sisipkan label:</span>
          <button class="btn" style="padding:3px 10px;font-size:12px;" onclick="insertLabel('Intro')">Intro</button>
          <button class="btn" style="padding:3px 10px;font-size:12px;" onclick="insertLabel('Verse 1')">Verse</button>
          <button class="btn" style="padding:3px 10px;font-size:12px;" onclick="insertLabel('Pre-Chorus')">Pre-Chorus</button>
          <button class="btn" style="padding:3px 10px;font-size:12px;" onclick="insertLabel('Reff')">Reff</button>
          <button class="btn" style="padding:3px 10px;font-size:12px;" onclick="insertLabel('Bridge')">Bridge</button>
          <button class="btn" style="padding:3px 10px;font-size:12px;" onclick="insertLabel('Interlude')">Interlude</button>
          <button class="btn" style="padding:3px 10px;font-size:12px;" onclick="insertLabel('Outro')">Outro</button>
        </div>

        <textarea class="input-field" id="chord-textarea" rows="12"
          placeholder="Tulis chord dalam [kurung] langsung di lirik:&#10;&#10;**Verse 1**&#10;[1]Ku mau me[4]muji Tu[5]han[1]ku&#10;&#10;**Reff**&#10;[4]Haleluya [5]Tuhan[1]ku&#10;&#10;Label section: **Intro**, **Verse 1**, **Reff**, dll&#10;Chord: [1] [4m] [5sus4] [4/5]"
          style="resize:vertical;font-size:14px;font-family:monospace;line-height:2;letter-spacing:0.02em;"
          oninput="saveSectionText(); updatePreviewDebounced()"></textarea>

        <div class="hint-text">
          Label section: <code style="background:var(--accent-light);color:var(--accent);padding:1px 5px;border-radius:4px;font-size:11px;">**Intro**</code>
          &nbsp;&middot;&nbsp;
          Chord dalam <code style="background:var(--accent-light);color:var(--accent);padding:1px 5px;border-radius:4px;font-size:11px;">[kurung]</code>
          &nbsp;&middot;&nbsp;
          Suffix: m, 7, m7, maj7, sus4, dim, aug &nbsp;&middot;&nbsp;
          Slash: [4/5]
        </div>

        <!-- Live preview -->
        <div id="chord-preview" style="margin-top:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);min-height:36px;font-size:13px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--hint);">
              Preview &nbsp;&middot;&nbsp; Key <span id="preview-key">C</span>
            </div>
            <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;">
              <span>Angka</span>
              <input type="checkbox" id="preview-toggle" checked style="accent-color:var(--accent);" onchange="updatePreviewNow()">
              <span>Nada</span>
            </label>
          </div>
          <div id="preview-content" style="font-family:monospace;line-height:2.4;white-space:pre-wrap;"></div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveSong()">Simpan Lagu</button>
        <button class="btn btn-danger" id="delete-btn" onclick="deleteSong()" style="display:none">Hapus</button>
        <button class="btn" onclick="closeModal()">Batal</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
// ============================================================
// PIN GUARD
// ============================================================
const _AH = '33dc0ba86008f4434bd43d050df9022209367483c1eef5280b25da861c32f6ad'

async function _hash(val) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val))
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('')
}

async function checkPin() {
  if (sessionStorage.getItem('_wa') === '1') return
  const pin = prompt('Masukkan PIN Admin:')
  if (!pin) { location.replace('index.html'); return }
  const h = await _hash(pin.trim())
  if (h !== _AH) {
    alert('PIN salah.')
    location.replace('index.html')
    return
  }
  sessionStorage.setItem('_wa', '1')
}

checkPin()
</script>
<script>

// ============================================================
// STATE
// ============================================================
function escapeHtml(str) {
  if (!str) return ''
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

const SECTION_NAMES = ['All']

let allSongs = []
let editingSongId = null
let sections = { All: '' }
let previewTimer = null
let setlistSongs = []

// ============================================================
// PANEL SWITCHING
// ============================================================
function showPanel(name, btn) {
  document.getElementById('panel-songs').style.display = name === 'songs' ? 'block' : 'none'
  document.getElementById('panel-setlist').style.display = name === 'setlist' ? 'block' : 'none'
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  if (name === 'setlist') renderSlPicker(allSongs)
}

// ============================================================
// SONG LIST (admin)
// ============================================================
async function loadAdminSongs() {
  const { data } = await db.from('songs').select('id,title,default_key,song_type,genre,tempo').order('title')
  allSongs = data || []
  renderAdminList(allSongs)
  renderSlPicker(allSongs)
}

function renderAdminList(songs) {
  const el = document.getElementById('admin-song-list')
  if (!songs.length) { el.innerHTML = '<div class="empty">Belum ada lagu.</div>'; return }
  el.innerHTML = songs.map(s => {
    const meta = [s.song_type, s.genre, s.tempo].filter(Boolean).join(' · ')
    return `
    <div class="card" onclick="openSongForm('${s.id}')">
      <div class="card-row">
        <div>
          <div class="card-title">${escapeHtml(s.title)}</div>
          <div class="card-sub">${escapeHtml(meta) || 'ketuk untuk edit'}</div>
        </div>
        <span class="card-badge">${escapeHtml(s.default_key) || '—'}</span>
      </div>
    </div>`
  }).join('')
}

function filterAdminSongs() {
  const q = document.getElementById('admin-search').value.toLowerCase()
  renderAdminList(q ? allSongs.filter(s => s.title.toLowerCase().includes(q)) : allSongs)
}

// ============================================================
// SONG FORM MODAL
// ============================================================
async function openSongForm(id = null) {
  editingSongId = id
  resetForm()

  if (id) {
    document.getElementById('modal-title').textContent = 'Edit Lagu'
    document.getElementById('delete-btn').style.display = ''
    const { data } = await db.from('songs').select('*').eq('id', id).single()
    if (data) populateForm(data)
  } else {
    document.getElementById('modal-title').textContent = 'Tambah Lagu'
    document.getElementById('delete-btn').style.display = 'none'
  }

  document.getElementById('song-modal').style.display = 'block'
  document.body.style.overflow = 'hidden'
  updatePreviewNow()
}

function closeModal() {
  document.getElementById('song-modal').style.display = 'none'
  document.body.style.overflow = ''
}

function resetForm() {
  document.getElementById('f-title').value = ''
  document.getElementById('f-key').value = 'C'
  document.getElementById('f-song-type').value = ''
  document.getElementById('f-genre').value = ''
  document.getElementById('f-tempo').value = ''
  document.getElementById('f-notes').value = ''
  sections = { All: '' }
  const ta = document.getElementById('chord-textarea')
  if (ta) ta.value = ''
}

function populateForm(data) {
  document.getElementById('f-title').value = data.title || ''
  document.getElementById('f-key').value = data.default_key || 'C'
  document.getElementById('f-song-type').value = data.song_type || ''
  document.getElementById('f-genre').value = data.genre || ''
  document.getElementById('f-tempo').value = data.tempo || ''
  document.getElementById('f-notes').value = data.notes || ''

  const raw = data.sections || {}
  // Merge all sections into one combined text
  const MERGE_ORDER = ['Intro','Verse','Reff','Bridge','Outro']
  const allKeys = [...MERGE_ORDER.filter(s => raw[s]), ...Object.keys(raw).filter(s => !MERGE_ORDER.includes(s) && raw[s])]
  const combined = allKeys.map(s => {
    const val = raw[s]
    return Array.isArray(val) ? legacyTokensToInline(val) : (val || '')
  }).filter(Boolean).join('\n')
  sections = { All: combined }

  const ta = document.getElementById('chord-textarea')
  if (ta) ta.value = sections.All || ''
  updatePreviewNow()
}

// Migrate old token array → [chord] inline format
function legacyTokensToInline(arr) {
  if (!Array.isArray(arr)) return arr || ''
  let result = ''
  arr.forEach(t => {
    if (!t || typeof t !== 'string' || !t.trim()) return
    if (t === '\n') { result += '\n'; return }
    result += '[' + t + '] '
  })
  return result.trim()
}

async function saveSong() {
  saveSectionText()

  const title = document.getElementById('f-title').value.trim()
  if (!title) { toast('Judul wajib diisi'); return }

  // Derive plain lyrics by stripping chords
  const derivedLyrics = (sections.All || '').split('\n').map(line => stripChords(line).trim()).filter(Boolean).join('\n') || null

  const payload = {
    title,
    default_key: document.getElementById('f-key').value,
    song_type: document.getElementById('f-song-type').value || null,
    genre: document.getElementById('f-genre').value.trim() || null,
    tempo: document.getElementById('f-tempo').value.trim() || null,
    notes: document.getElementById('f-notes').value.trim() || null,
    lyrics: derivedLyrics,
    sections: { All: sections.All || '' }
  }

  let error
  if (editingSongId) {
    ({ error } = await db.from('songs').update(payload).eq('id', editingSongId))
  } else {
    ({ error } = await db.from('songs').insert(payload))
  }

  if (error) { toast('Gagal menyimpan: ' + error.message); return }
  toast('Lagu disimpan!')
  closeModal()
  loadAdminSongs()
}

async function deleteSong() {
  if (!confirm('Hapus lagu ini?')) return
  const { error } = await db.from('songs').delete().eq('id', editingSongId)
  if (error) { toast('Gagal menghapus'); return }
  toast('Lagu dihapus')
  closeModal()
  loadAdminSongs()
}

// ============================================================
// CHORD TEXTAREA + LIVE PREVIEW
// ============================================================

function saveSectionText() {
  const ta = document.getElementById('chord-textarea')
  if (ta) sections.All = ta.value
}

function updatePreviewDebounced() {
  clearTimeout(previewTimer)
  previewTimer = setTimeout(updatePreviewNow, 300)
}

function updatePreviewNow() {
  const ta = document.getElementById('chord-textarea')
  const previewEl = document.getElementById('preview-content')
  const keyEl = document.getElementById('preview-key')
  if (!ta || !previewEl) return

  const text = ta.value
  const keyVal = document.getElementById('f-key') ? document.getElementById('f-key').value : 'C'
  const keyIdx = keyIndex(keyVal)
  const showNotes = document.getElementById('preview-toggle') ? document.getElementById('preview-toggle').checked : true
  if (keyEl) keyEl.textContent = keyVal

  if (!text.trim()) {
    previewEl.innerHTML = '<span style="color:var(--hint);font-style:italic;font-size:12px;">Belum ada konten...</span>'
    return
  }

  const rawLines = text.split('\n')
  previewEl.innerHTML = rawLines.map(line => {
    // Section label
    if (/^\*\*(.+)\*\*$/.test(line.trim())) {
      const labelText = line.trim().replace(/^\*\*(.+)\*\*$/, '$1')
      return `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);background:var(--accent-light);display:inline-block;padding:1px 8px;border-radius:20px;margin:10px 0 5px;">${escapeHtml(labelText)}</div><br>`
    }

    const segments = parseInlineLine(line)
    const hasChord = segments.some(seg => seg.chord && seg.chord.trim())
    const hasLyric = segments.some(seg => seg.lyric && seg.lyric.trim())

    if (!hasChord && !hasLyric) return '<div style="height:6px;"></div>'

    // Pure lyric line (no chord)
    if (!hasChord) {
      const label = segments.map(s => escapeHtml(s.lyric || '')).join('')
      return `<div style="font-size:13px;margin-bottom:4px;">${label}</div>`
    }

    // Chord-only line
    if (!hasLyric) {
      const chords = segments.filter(seg => seg.chord && seg.chord.trim()).map(seg => {
        const display = showNotes ? escapeHtml(tokenToChord(seg.chord.trim(), keyIdx)) : escapeHtml(seg.chord.trim())
        return `<span style="display:inline-block;background:var(--accent-light);color:var(--accent);border-radius:4px;padding:1px 7px;font-size:12px;font-weight:700;margin-right:6px;">${display}</span>`
      }).join('')
      return `<div style="margin-bottom:4px;">${chords}</div>`
    }

    // Mixed chord+lyric: merge consecutive chord-only segments
    const merged = []
    let pendingChords = []
    segments.forEach(seg => {
      const hasC = seg.chord && seg.chord.trim()
      const hasL = seg.lyric && seg.lyric.length > 0
      if (hasC && !hasL) {
        pendingChords.push(seg.chord.trim())
      } else if (hasC && hasL) {
        merged.push({ chords: [...pendingChords, seg.chord.trim()], lyric: seg.lyric })
        pendingChords = []
      } else if (!hasC && hasL) {
        merged.push({ chords: [...pendingChords], lyric: seg.lyric })
        pendingChords = []
      }
    })
    if (pendingChords.length) merged.push({ chords: pendingChords, lyric: '' })

    const cells = merged.map(unit => {
      const lyricSpan = `<span style="display:block;white-space:pre;font-size:13px;">${escapeHtml(unit.lyric) || '\u00a0'}</span>`
      if (unit.chords.length === 0) {
        return `<span style="display:inline-flex;flex-direction:column;vertical-align:bottom;">
          <span style="display:block;min-height:20px;"></span>${lyricSpan}</span>`
      }
      const badges = unit.chords.map(c => {
        const display = showNotes ? escapeHtml(tokenToChord(c, keyIdx)) : escapeHtml(c)
        return `<span style="background:var(--accent-light);color:var(--accent);border-radius:3px;padding:0 4px;font-size:11px;font-weight:700;white-space:nowrap;">${display}</span>`
      }).join('<span style="display:inline-block;width:3px;"></span>')
      return `<span style="display:inline-flex;flex-direction:column;vertical-align:bottom;align-items:flex-start;">
        <span style="display:flex;gap:2px;flex-wrap:nowrap;margin-bottom:2px;">${badges}</span>${lyricSpan}</span>`
    }).join('')

    return `<div style="margin-bottom:10px;line-height:1.3;">${cells}</div>`
  }).join('')
}

// Update preview when key changes
document.addEventListener('DOMContentLoaded', () => {
  const keyEl = document.getElementById('f-key')
  if (keyEl) keyEl.addEventListener('change', updatePreviewNow)
})

// ============================================================
// SECTION LABEL INSERTER
// ============================================================
function insertLabel(name) {
  const ta = document.getElementById('chord-textarea')
  if (!ta) return
  const start = ta.selectionStart
  const end = ta.selectionEnd
  const val = ta.value
  const label = '**' + name + '**'
  // Add newline before if not at start of line
  const before = start > 0 && val[start - 1] !== '\n' ? '\n' : ''
  const insert = before + label + '\n'
  ta.value = val.slice(0, start) + insert + val.slice(end)
  const newPos = start + insert.length
  ta.selectionStart = ta.selectionEnd = newPos
  ta.focus()
  saveSectionText()
  updatePreviewNow()
}


// ============================================================
// SETLIST BUILDER
// ============================================================
function escapeAttr(str) {
  if (!str) return ''
  return escapeHtml(str).replace(/'/g, '&#39;')
}

function renderSlPicker(songs) {
  const el = document.getElementById('sl-song-picker')
  if (!el) return
  el.innerHTML = songs.map(s => {
    const safeId = s.id
    const safeTitle = escapeAttr(s.title)
    const safeKey = escapeAttr(s.default_key || 'C')
    return `
    <div class="card" style="margin-bottom:6px;" onclick="addToSetlist('${safeId}','${safeTitle}','${safeKey}')">
      <div class="card-row">
        <div class="card-title" style="font-size:14px;">${escapeHtml(s.title)}</div>
        <span style="font-size:13px;color:var(--hint)">+ tambah</span>
      </div>
    </div>
  `}).join('')
}
function filterSlSongs() {
  const q = document.getElementById('sl-search').value.toLowerCase()
  renderSlPicker(q ? allSongs.filter(s => s.title.toLowerCase().includes(q)) : allSongs)
}

function addToSetlist(id, title, key) {
  if (setlistSongs.find(s => s.id === id)) { toast('Lagu sudah ada'); return }
  setlistSongs.push({ id, title, keyUsed: key, note: '' })
  renderSetlistBuilder()
}

function removeFromSetlist(id) {
  setlistSongs = setlistSongs.filter(s => s.id !== id)
  renderSetlistBuilder()
}

function renderSetlistBuilder() {
  const el = document.getElementById('setlist-songs')
  if (!setlistSongs.length) {
    el.innerHTML = '<div class="empty" style="padding:1rem 0;">Belum ada lagu. Cari dan tambahkan di bawah.</div>'
    return
  }
  el.innerHTML = setlistSongs.map((s, i) => `
    <div class="card" style="cursor:default;margin-bottom:6px;">
      <div class="card-row" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="color:var(--hint);font-size:13px;">${i+1}</span>
          <span style="font-weight:500;">${s.title}</span>
        </div>
        <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;" onclick="removeFromSetlist('${s.id}')">hapus</button>
      </div>
      <div style="display:flex;gap:8px;">
        <select class="input-field" style="flex:0 0 80px;font-size:13px;"
          onchange="setlistSongs[${i}].keyUsed=this.value">
          ${KEYS.map(k => `<option ${k===s.keyUsed?'selected':''}>${k}</option>`).join('')}
        </select>
        <input class="input-field" type="text" placeholder="catatan (opsional)" style="font-size:13px;"
          value="${s.note || ''}" oninput="setlistSongs[${i}].note=this.value" />
      </div>
    </div>
  `).join('')
}

async function saveSetlist() {
  const date = document.getElementById('svc-date').value
  const type = document.getElementById('svc-type').value
  const theme = document.getElementById('svc-theme').value.trim()

  if (!date) { toast('Pilih tanggal dulu'); return }
  if (!setlistSongs.length) { toast('Tambahkan minimal 1 lagu'); return }

  const { data: svc, error: e1 } = await db
    .from('services')
    .insert({ service_date: date, service_type: type, theme: theme || null })
    .select()
    .single()

  if (e1) { toast('Gagal: ' + e1.message); return }

  const items = setlistSongs.map((s, i) => ({
    service_id: svc.id,
    song_id: s.id,
    position: i + 1,
    key_used: s.keyUsed || null,
    note: s.note || null
  }))

  const { error: e2 } = await db.from('setlist_items').insert(items)
  if (e2) { toast('Gagal simpan setlist: ' + e2.message); return }

  toast('Setlist disimpan!')
  setlistSongs = []
  renderSetlistBuilder()
  document.getElementById('svc-date').value = ''
  document.getElementById('svc-theme').value = ''
}
